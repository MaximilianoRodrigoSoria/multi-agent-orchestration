services:
  # Servidor de LLM local. Expone la API en localhost:11434 (lo que espera el .env).
  ollama:
    image: ollama/ollama:latest
    container_name: mao-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # GPU opcional (NVIDIA): descomentar si tenés drivers + nvidia-container-toolkit.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Helper one-shot para descargar el modelo dentro del volumen de Ollama.
  # Correr una vez:  docker compose --profile pull up ollama-pull
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${OLLAMA_MODEL:-llama3.1:8b}"]
    profiles: ["pull"]
    restart: "no"

volumes:
  ollama-data:
